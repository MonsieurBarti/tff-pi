name: CI

on:
	push:
		branches: [main]
	pull_request:
		branches: [main]

jobs:
	ci:
		name: CI
		runs-on: ubuntu-latest
		steps:
			- name: Checkout
				uses: actions/checkout@v4

			- name: Setup Bun
				uses: oven-sh/setup-bun@v2
				with:
					bun-version: latest

			- name: Install dependencies
				run: bun install --frozen-lockfile

			- name: Lint
				run: bun run lint

			- name: TypeCheck
				run: bun run typecheck

			- name: Test
				run: bun run test

			- name: Build
				run: bun run build

			- name: Upload build artifacts
				uses: actions/upload-artifact@v4
				with:
					name: dist
					path: dist
					retention-days: 7
