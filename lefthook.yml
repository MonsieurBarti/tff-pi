commit-msg:
  commands:
    commitlint:
      run: bunx commitlint --edit {1}

pre-commit:
  parallel: true
  commands:
    biome:
      run: bun run lint
    typecheck:
      run: bun run typecheck
    test:
      # Scrub GIT_* env so tests that do `execFileSync("git ...", {cwd: tmpRepo})`
      # can't leak writes into the outer repo. GIT_INDEX_FILE alone reproduces
      # "ghost staging" (index entry in outer worktree, blob in temp repo's
      # objects that vanishes on cleanup). The scrub list lives in
      # scripts/scrub-git-env.sh; tests/setup.ts scrubs again at worker
      # startup as a second line of defense.
      run: scripts/scrub-git-env.sh bun run test
