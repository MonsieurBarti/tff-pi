commit-msg:
  commands:
    commitlint:
      run: bunx commitlint --edit {1}

pre-commit:
  parallel: true
  commands:
    biome:
      run: bun run lint
    typecheck:
      run: bun run typecheck
    test:
      # Scrub GIT_* env so tests that do `execSync("git config ...", {cwd: tmpRepo})`
      # can't leak writes into the outer repo (lefthook sets GIT_DIR at invocation).
      # `env -u` fully unsets (empty-string is ambiguous for libgit).
      run: env -u GIT_DIR -u GIT_WORK_TREE bun run test
